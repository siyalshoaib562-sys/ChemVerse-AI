<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemVerse AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>ChemVerse AI</h1>
        <p>Interactive Chemistry Learning Platform</p>
        <input type="text" id="searchBox" placeholder="Search Element by Name, Symbol, or Atomic Number...">
    </header>

    <main class="table-section">
        <div class="table-responsive-wrapper">
            <div id="periodicTable"></div>
        </div>
    </main>

    <div id="elementModal" class="modal">
        <div class="modal-content">
            <span id="closeBtn">&times;</span>
            <div id="elementInfo"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
