<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemVerse AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>ChemVerse AI</h1>
        <p>Interactive Chemistry Learning Platform</p>
        <input type="text" id="searchBox" placeholder="Search Element...">
    </header>

    <section class="filters">
        <h2>Display Properties</h2>
        <label><input type="checkbox" checked> Atomic Number</label>
        <label><input type="checkbox"> Atomic Mass</label>
        <label><input type="checkbox"> Density</label>
        <label><input type="checkbox"> Melting Point</label>
        <label><input type="checkbox"> Boiling Point</label>
    </section>

    <section class="table-section">
        <h2>Periodic Table</h2>
        <div class="table-responsive-wrapper">
            <div id="periodicTable"></div>
        </div>
    </section>

    <div id="elementModal" class="modal">
        <div class="modal-content">
            <span id="closeBtn">&times;</span>
            <div id="elementInfo"></div>
        </div>
    </div>

    <button id="chatToggleBtn" class="chat-toggle-btn">💬</button>

    <div id="chatbot">
        <div id="chatHeader">
            <span>ChemVerse AI</span>
            <button id="settingsToggleBtn" title="API Settings">⚙️</button>
        </div>
        
        <div id="apiSettingsPanel" class="hidden">
            <input type="password" id="apiKeyInput" placeholder="Paste Gemini API Key here...">
            <button id="saveKeyBtn">Save</button>
        </div>

        <div id="chatMessages"></div>
        <div class="chatInput">
            <input type="text" id="userInput" placeholder="Ask chemistry questions...">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
